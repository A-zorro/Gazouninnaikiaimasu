<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OCR Test | カオゼロ v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@600;700&display=swap">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      padding: 16px 14px 60px;
    }

    .header {
      text-align: center;
      padding: 20px 0 24px;
      border-bottom: 1px solid #333;
      margin-bottom: 20px;
    }
    .header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: #fff;
    }
    .header p { font-size: 11px; color: #666; margin-top: 4px; }

    .card {
      background: #252525;
      border: 1px solid #383838;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 700;
      color: #666;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* アップロード */
    .upload-area {
      position: relative;
      border: 1.5px dashed #444;
      border-radius: 10px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s;
      color: #666;
      font-size: 13px;
    }
    .upload-area:hover { border-color: #7eb8d4; color: #7eb8d4; }
    .upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0;
      width: 100%; height: 100%; cursor: pointer;
    }
    .upload-icon { font-size: 28px; }

    /* プレビュー */
    #previewArea { display: none; }
    #previewCanvas {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #383838;
      display: block;
    }

    /* 領域選択ガイド */
    .region-hint {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      text-align: center;
    }

    /* 設定 */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .setting-label {
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
      width: 80px;
    }
    select, input[type=range] {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      padding: 6px 8px;
    }

    /* 前処理トグル */
    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .toggle-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: transparent;
      color: #666;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      border-color: #7eb8d4;
      color: #7eb8d4;
      background: rgba(126,184,212,0.1);
    }

    /* ボタン */
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: transparent;
      color: #e0e0e0;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      border-color: #7eb8d4;
      color: #7eb8d4;
      background: rgba(126,184,212,0.08);
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ステータス */
    #statusBar {
      display: none;
      padding: 10px 14px;
      background: #1e1e1e;
      border-radius: 8px;
      border: 1px solid #383838;
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
    .progress-bar {
      height: 3px;
      background: #333;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #7eb8d4;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    /* 結果 */
    #resultArea { display: none; }
    .result-block {
      margin-bottom: 14px;
    }
    .result-block-label {
      font-size: 10px;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .result-text {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 60px;
      color: #c8c8c8;
    }
    .result-text.empty { color: #555; font-style: italic; }

    /* 信頼度バー */
    .conf-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .conf-label { font-size: 11px; color: #888; width: 60px; }
    .conf-bar {
      flex: 1;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    .conf-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }
    .conf-val { font-size: 11px; color: #888; width: 36px; text-align: right; }

    /* 単語一覧 */
    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .word-chip {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      border: 1px solid;
    }
    .word-chip.high { border-color: #34d399; color: #34d399; background: rgba(52,211,153,0.08); }
    .word-chip.mid  { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.08); }
    .word-chip.low  { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.08); }

    /* コピーボタン */
    .copy-btn {
      margin-top: 6px;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: transparent;
      color: #888;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      cursor: pointer;
    }
    .copy-btn.copied { border-color: #34d399; color: #34d399; }

    /* バージョン */
    .version {
      text-align: center;
      font-size: 10px;
      color: #444;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>OCR TEST</h1>
  <p>Tesseract.js 精度検証ツール — カオゼロ v2</p>
</div>

<!-- STEP1: 画像アップロード -->
<div class="card">
  <div class="card-title">STEP 1 — 画像アップロード</div>
  <div class="upload-area" id="uploadArea">
    <span class="upload-icon">🖼️</span>
    <span>カード画像をタップして選択</span>
    <input type="file" accept="image/*" id="fileInput">
  </div>
</div>

<!-- プレビュー -->
<div class="card" id="previewArea">
  <div class="card-title">PREVIEW</div>
  <canvas id="previewCanvas"></canvas>
  <p class="region-hint">※ 全体をOCRします</p>
</div>

<!-- STEP2: 設定 -->
<div class="card" id="settingsArea" style="display:none;">
  <div class="card-title">STEP 2 — 設定</div>

  <div class="setting-row">
    <span class="setting-label">言語</span>
    <select id="langSelect">
      <option value="jpn">日本語 (jpn)</option>
      <option value="eng">英語 (eng)</option>
      <option value="jpn+eng">日本語+英語</option>
    </select>
  </div>

  <div class="setting-row">
    <span class="setting-label">モード</span>
    <select id="modeSelect">
      <option value="3">自動（デフォルト）</option>
      <option value="6">単一ブロック</option>
      <option value="7">単一行</option>
      <option value="11">スペースなし単一行</option>
      <option value="13">生テキスト行</option>
    </select>
  </div>

  <div class="card-title" style="margin-top:12px;">前処理（重ねがけ可）</div>
  <div class="toggle-row">
    <button class="toggle-btn" id="toggleGray">グレースケール</button>
    <button class="toggle-btn" id="toggleContrast">コントラスト強調</button>
    <button class="toggle-btn" id="toggleThresh">二値化</button>
    <button class="toggle-btn" id="toggleInvert">白黒反転</button>
    <button class="toggle-btn" id="toggleScale">2倍拡大</button>
  </div>

  <button class="btn btn-primary" id="runBtn" onclick="runOCR()">▶ OCR実行</button>

  <div id="statusBar">
    <span id="statusText">処理中...</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<!-- STEP3: 結果 -->
<div class="card" id="resultArea">
  <div class="card-title">STEP 3 — 結果</div>

  <div class="result-block">
    <div class="result-block-label">認識テキスト（生）</div>
    <div class="result-text" id="rawText"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyText()">📋 コピー</button>
  </div>

  <div class="result-block">
    <div class="result-block-label">信頼度</div>
    <div class="conf-row">
      <span class="conf-label">全体</span>
      <div class="conf-bar"><div class="conf-fill" id="confFill"></div></div>
      <span class="conf-val" id="confVal">-</span>
    </div>
  </div>

  <div class="result-block">
    <div class="result-block-label">単語別（信頼度色分け）</div>
    <div class="word-list" id="wordList"></div>
    <div style="font-size:10px;color:#555;margin-top:6px;">
      🟢 80以上 &nbsp; 🟡 50〜79 &nbsp; 🔴 50未満
    </div>
  </div>
</div>

<div class="version">OCR Test v1.0 — Tesseract.js</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  let originalImageData = null;
  let previewImg = null;

  const toggleStates = {
    gray: false, contrast: false,
    thresh: false, invert: false, scale: false
  };

  // トグルボタン設定
  ['gray','contrast','thresh','invert','scale'].forEach(key => {
    document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1))
      .addEventListener('click', function() {
        toggleStates[key] = !toggleStates[key];
        this.classList.toggle('active', toggleStates[key]);
        if (originalImageData) applyPreprocess();
      });
  });

  // ファイル選択
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        previewImg = img;
        const canvas = document.getElementById('previewCanvas');
        canvas.width  = img.width;
        canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        originalImageData = canvas.getContext('2d').getImageData(0, 0, img.width, img.height);

        document.getElementById('previewArea').style.display = 'block';
        document.getElementById('settingsArea').style.display = 'block';
        document.getElementById('resultArea').style.display  = 'none';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // 前処理適用
  function applyPreprocess() {
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;

    // オリジナルに戻す
    ctx.putImageData(originalImageData, 0, 0);
    let imgData = ctx.getImageData(0, 0, w, h);
    let d = imgData.data;

    // グレースケール
    if (toggleStates.gray || toggleStates.contrast || toggleStates.thresh) {
      for (let i = 0; i < d.length; i += 4) {
        const g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
        d[i] = d[i+1] = d[i+2] = g;
      }
    }

    // コントラスト強調
    if (toggleStates.contrast) {
      const factor = 2.0;
      for (let i = 0; i < d.length; i += 4) {
        d[i]   = Math.min(255, Math.max(0, factor*(d[i]  -128)+128));
        d[i+1] = Math.min(255, Math.max(0, factor*(d[i+1]-128)+128));
        d[i+2] = Math.min(255, Math.max(0, factor*(d[i+2]-128)+128));
      }
    }

    // 二値化
    if (toggleStates.thresh) {
      const th = 128;
      for (let i = 0; i < d.length; i += 4) {
        const v = d[i] > th ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = v;
      }
    }

    // 白黒反転
    if (toggleStates.invert) {
      for (let i = 0; i < d.length; i += 4) {
        d[i]   = 255 - d[i];
        d[i+1] = 255 - d[i+1];
        d[i+2] = 255 - d[i+2];
      }
    }

    ctx.putImageData(imgData, 0, 0);

    // 2倍拡大（別canvasに）
    if (toggleStates.scale) {
      const tmp = document.createElement('canvas');
      tmp.width  = w * 2;
      tmp.height = h * 2;
      tmp.getContext('2d').drawImage(canvas, 0, 0, w*2, h*2);
      ctx.clearRect(0, 0, w, h);
      canvas.width  = w * 2;
      canvas.height = h * 2;
      canvas.getContext('2d').drawImage(tmp, 0, 0);
    } else {
      canvas.width  = originalImageData.width;
      canvas.height = originalImageData.height;
      canvas.getContext('2d').putImageData(imgData, 0, 0);
    }
  }

  // OCR実行
  async function runOCR() {
    if (!previewImg) return;

    const btn = document.getElementById('runBtn');
    btn.disabled = true;

    const statusBar = document.getElementById('statusBar');
    statusBar.style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';

    const lang = document.getElementById('langSelect').value;
    const psm  = document.getElementById('modeSelect').value;

    try {
      const canvas = document.getElementById('previewCanvas');

      const result = await Tesseract.recognize(canvas, lang, {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round(m.progress * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('statusText').textContent   = `認識中... ${pct}%`;
          } else {
            document.getElementById('statusText').textContent = m.status;
          }
        },
        tessedit_pageseg_mode: psm,
      });

      displayResult(result);
    } catch (e) {
      document.getElementById('statusText').textContent = 'エラー: ' + e.message;
    }

    btn.disabled = false;
  }

  function displayResult(result) {
    document.getElementById('statusBar').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';

    // 生テキスト
    const rawText = result.data.text.trim();
    const rawEl   = document.getElementById('rawText');
    rawEl.textContent = rawText || '（テキスト未検出）';
    rawEl.className   = 'result-text' + (rawText ? '' : ' empty');

    // 全体信頼度
    const conf = result.data.confidence;
    const confColor = conf >= 70 ? '#34d399' : conf >= 40 ? '#fbbf24' : '#f87171';
    document.getElementById('confFill').style.width      = conf + '%';
    document.getElementById('confFill').style.background = confColor;
    document.getElementById('confVal').textContent        = Math.round(conf) + '%';
    document.getElementById('confVal').style.color        = confColor;

    // 単語別
    const wordList = document.getElementById('wordList');
    wordList.innerHTML = '';
    (result.data.words || []).forEach(w => {
      if (!w.text.trim()) return;
      const chip = document.createElement('span');
      chip.className = 'word-chip ' + (w.confidence >= 80 ? 'high' : w.confidence >= 50 ? 'mid' : 'low');
      chip.textContent = w.text + ' (' + Math.round(w.confidence) + ')';
      wordList.appendChild(chip);
    });
    if (!wordList.children.length) {
      wordList.innerHTML = '<span style="color:#555;font-size:12px;">単語なし</span>';
    }

    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText() {
    const text = document.getElementById('rawText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ コピーしました';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 コピー';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
